-{toolbar}-
<div class="btn-toolbar mb-2 mb-md-0">
  <button type="button" id="firmware-flash-btn" class="btn btn-sm btn-primary me-2">
    <span data-feather="upload"></span> Update firmware
  </button>
  <input type="file" id="firmware-file" accept=".bin,.hex,.elf" hidden>
</div>
-{content}-
<% local firmware = printer:get_firmware_info() %>
<dl class="row mb-0">
  <dt class="col-sm-3">Version</dt>
  <dd class="col-sm-9" id="firmware-version"><%= firmware.version %></dd>
  <dt class="col-sm-3">Flags</dt>
  <dd class="col-sm-9" id="firmware-flags"><%= firmware.flags %></dd>
</dl>
<div id="firmware-update-panel" class="mt-3" style="display:none">
  <div class="mb-2">
    <span class="text-muted">Status:</span> <span id="firmware-status"></span>
  </div>
  <div class="progress">
    <div id="firmware-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"></div>
  </div>
</div>
-{scripts}-
<script>
  var firmwarePollTimer = null;
  var lastFirmwareStatus = null;

  function firmwareInProgress(info) {
    return info.status && info.status !== 'done' && info.status !== 'error';
  }

  function updateFirmwareUI(info) {
    $('#firmware-version').text(info.version);
    $('#firmware-flags').text(info.flags);

    if (firmwareInProgress(info)) {
      $('#firmware-update-panel').show();
      $('#firmware-status').text(info.status);
      $('#firmware-flash-btn').prop('disabled', true);

      var pct = 0;
      if (info.total && info.total > 0) {
        pct = Math.round((info.progress || 0) / info.total * 100);
      }
      $('#firmware-progress-bar').css('width', pct + '%').attr('aria-valuenow', pct).text(pct + '%');
    } else {
      if (info.status === 'done' && lastFirmwareStatus !== 'done') {
        bootstrap_alert.success('<p>Firmware update completed</p>');
      } else if (info.status === 'error' && lastFirmwareStatus !== 'error') {
        bootstrap_alert.error(
          '<p>Firmware update failed</p>' +
          '<hr><p class="mb-0">' + (info.error || 'unknown error') + '</p>'
        );
      }

      $('#firmware-update-panel').hide();
      $('#firmware-flash-btn').prop('disabled', false);
    }

    lastFirmwareStatus = info.status;
  }

  function pollFirmwareStatus() {
    fetch('/api/firmware/status', {
      method: 'POST',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({})
    })
      .then(checkStatus)
      .then(parseJSON)
      .then(checkResultStatus)
      .then(function(data) {
        updateFirmwareUI(data.firmware);
      })
      .catch(function(error) {
        console.log('firmware status poll failed', error);
      });
  }

  function startFirmwarePolling() {
    if (firmwarePollTimer) {
      return;
    }
    pollFirmwareStatus();
    firmwarePollTimer = setInterval(pollFirmwareStatus, 1000);
  }

  $('#firmware-flash-btn').click(function() {
    $('#firmware-file').click();
  });

  $('#firmware-file').change(function() {
    var file = this.files[0];
    if (!file) {
      return;
    }

    var data = new FormData();
    data.append('file', file);
    fetch('/api/firmware/flash', {
      method: 'POST',
      body: data
    })
      .then(checkStatus)
      .then(parseJSON)
      .then(checkResultStatus)
      .then(function() {
        startFirmwarePolling();
      })
      .catch(function(error) {
        bootstrap_alert.error(
          '<p>Failed to start firmware update</p>' +
          '<hr><p class="mb-0">' + error + '</p>'
        );
      });
    this.value = '';
  });

  startFirmwarePolling();
</script>
