-{scripts}-

<script type="text/javascript">

var center_x = (typeof state !== 'undefined' && state.pos_x != null) ? state.pos_x : null;
var center_y = (typeof state !== 'undefined' && state.pos_y != null) ? state.pos_y : null;
page_ctx.pnts = {};
var laser_enabled = false;
var laser_pwm_level = 0;

function format_laser_pwm(val) {
  return Math.round(val / 1024 * 100) + '%';
}

function update_laser_pwm_label() {
  $('#laser-pwm-value').text(format_laser_pwm(laser_pwm_level));
}

function update_laser_controls() {
  var printer_idle = typeof state !== 'undefined' && state.state === 'idle';
  $('#laser-pwm').prop('disabled', !printer_idle || !laser_enabled);
}

function apply_laser_pwm() {
  var v = laser_enabled ? laser_pwm_level : 0;
  do_printer_action('setup-laser-pwm', { v: v });
}

function set_laser_enabled(enabled) {
  laser_enabled = enabled;
  $('#laser-switch').attr('aria-pressed', enabled ? 'true' : 'false');
  update_laser_controls();
  apply_laser_pwm();
}

update_laser_pwm_label();
update_laser_controls();

function get_printer_pos() {
  var x = center_x;
  var y = center_y;
  if (x == null && typeof state !== 'undefined' && state.pos_x != null) {
    x = state.pos_x;
  }
  if (y == null && typeof state !== 'undefined' && state.pos_y != null) {
    y = state.pos_y;
  }
  return { x: x, y: y };
}

function format_pnt_val(v) {
  if (v === undefined || v === null) {
    return '—';
  }
  return Number(v).toFixed(3);
}

function format_pnt_pair(x, y) {
  return format_pnt_val(x) + ', ' + format_pnt_val(y);
}

function set_pnt_label(id, text) {
  var el = document.getElementById(id);
  if (el) {
    el.textContent = text;
  }
}

function update_pnt_labels(pnt_name, pnt) {
  if (!pnt) {
    return;
  }
  set_pnt_label(pnt_name + '-set-label', format_pnt_pair(pnt.x, pnt.y));
  if (pnt.px != null && pnt.py != null) {
    set_pnt_label(pnt_name + '-act-label', format_pnt_pair(pnt.px, pnt.py));
  } else {
    set_pnt_label(pnt_name + '-act-label', '—, —');
  }
}

function update_pnt_visibility() {
  $('#pnt1-corner').toggleClass('d-none', !(page_ctx.pnts && page_ctx.pnts.pnt1));
  $('#pnt2-corner').toggleClass('d-none', !(page_ctx.pnts && page_ctx.pnts.pnt2));
}

function update_pnt_go_buttons() {
  var printer_idle = typeof state !== 'undefined' && state.state === 'idle';
  ['pnt1', 'pnt2'].forEach(function(name) {
    var pnt = page_ctx.pnts && page_ctx.pnts[name];
    var has_act = pnt && pnt.px != null && pnt.py != null;
    $('.pnt-go-btn[data-pnt="' + name + '"]').prop('disabled', !printer_idle || !has_act);
  });
}

function refresh_pnt_labels() {
  if (!page_ctx.pnts) {
    return;
  }
  if (page_ctx.pnts.pnt1) {
    update_pnt_labels('pnt1', page_ctx.pnts.pnt1);
  }
  if (page_ctx.pnts.pnt2) {
    update_pnt_labels('pnt2', page_ctx.pnts.pnt2);
  }
  update_pnt_visibility();
  update_pnt_go_buttons();
  if (is_position_mobile() && !is_position_mobile_landscape()) {
    update_svg_view();
  }
}

function load_pnts() {
  fetch('/api/pcb/pnts', {
    method: 'POST',
    headers: {
      'Accept': 'application/json',
      'Content-Type': 'application/json'
    },
    body: '{}'
  })
  .then(checkStatus)
  .then(parseJSON)
  .then(checkResultStatus)
  .then(function(data) {
    page_ctx.pnts = data.pnts || {};
    refresh_pnt_labels();
  }).catch(function(error) {
    console.log('failed load pnts', error);
  });
}

load_pnts();
page_ctx.on_change_state = load_pnts;

function on_state_changed(state) {
}

function is_position_mobile() {
  return window.innerWidth <= 767;
}

function is_position_mobile_landscape() {
  return is_position_mobile() && window.innerWidth > window.innerHeight;
}

function get_viewport_height() {
  return window.visualViewport ? window.visualViewport.height : window.innerHeight;
}

function get_mobile_panels_reserve() {
  if (!is_position_mobile() || is_position_mobile_landscape()) {
    return 8;
  }
  let panels = document.getElementById('position-panels');
  if (panels && panels.offsetHeight > 0) {
    return panels.offsetHeight + 16;
  }
  return 160;
}

function update_svg_view() {
  let container = $('.position-view');
  let aspect = parseFloat(container.data('aspect'));
  if (!aspect) {
    return;
  }
  let maxW = $('.position-stack').width();
  if (maxW <= 0) {
    maxW = container.parent().width();
  }
  if (maxW <= 0) {
    return;
  }
  if (is_position_mobile_landscape()) {
    maxW = Math.max(maxW - Math.min(220, window.innerWidth * 0.38) - 8, 160);
  }
  let viewportTop = container.offset().top;
  if (window.visualViewport) {
    viewportTop -= window.visualViewport.offsetTop;
  }
  let maxH = get_viewport_height() - viewportTop - 8;
  if (maxH < 80) {
    maxH = 80;
  }
  if (is_position_mobile() && !is_position_mobile_landscape()) {
    maxH = Math.max(maxH - get_mobile_panels_reserve(), 120);
  }
  let w = maxW;
  let h = w / aspect;
  if (h > maxH) {
    h = maxH;
    w = h * aspect;
  }
  w = Math.floor(w);
  h = Math.floor(h);
  let svg_content = $('#svg-content');
  let svg_vp = $('#svg-viewport');
  if (is_position_mobile()) {
    container.css({ width: '100%', height: 'auto', overflow: 'visible' });
    svg_vp.css({ width: w, height: h, position: 'relative', margin: is_position_mobile_landscape() ? '' : '0 auto' });
  } else {
    container.css({ width: w, height: h, overflow: 'hidden' });
    svg_vp.css({ width: '100%', height: '100%', position: 'absolute', margin: '' });
  }
  svg_content.width(w);
  svg_content.height(h);
  svg_vp.width(w);
  svg_vp.height(h);
}

update_svg_view();

var touch_press_el = null;

function release_touch_press() {
  if (touch_press_el) {
    touch_press_el.classList.remove('touch-press');
    touch_press_el = null;
  }
}

document.addEventListener('touchend', release_touch_press, { passive: true });
document.addEventListener('touchcancel', release_touch_press, { passive: true });
window.addEventListener('pointerup', release_touch_press);
window.addEventListener('pointercancel', release_touch_press);

function bind_touch_press(selector, panelSelector) {
  var root = panelSelector ? document.querySelector(panelSelector) : document;
  if (!root) {
    return;
  }

  function find_button(target) {
    var el = target;
    while (el && el !== root) {
      if (el.nodeType === 1 && typeof el.matches === 'function' && el.matches(selector)) {
        return el;
      }
      el = el.parentElement;
    }
    return null;
  }

  function press_button(btn) {
    if (!btn || btn.disabled) {
      return;
    }
    release_touch_press();
    touch_press_el = btn;
    btn.classList.add('touch-press');
  }

  root.addEventListener('touchstart', function(e) {
    if (e.touches.length > 1) {
      return;
    }
    press_button(find_button(e.target));
  }, { passive: true });

  root.addEventListener('pointerdown', function(e) {
    if (e.pointerType === 'touch') {
      return;
    }
    press_button(find_button(e.target));
  });
}

bind_touch_press('button.jog-btn', '#position-stack');
bind_touch_press('button.laser-switch-btn', '#position-panels');

$(window).on('resize orientationchange', function() {
  update_svg_view();
});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', update_svg_view);
}

$('#jog-overlay').on('click', 'button.jog-btn', function(){
  if ($(this).prop('disabled')) {
    return;
  }
  let axis = $(this).attr('data-axis');
  let delta = parseFloat($(this).attr('data-delta'));
  if (axis === 'x') {
    do_printer_action("move-x", {x: delta});
  } else {
    do_printer_action("move-y", {y: delta});
  }
});

$('#laser-switch').on('click', function(){
  if ($(this).prop('disabled')) {
    return;
  }
  set_laser_enabled(!laser_enabled);
});

$('#laser-pwm').on('input', function(){
  laser_pwm_level = parseFloat($(this).val());
  update_laser_pwm_label();
  if (laser_enabled) {
    apply_laser_pwm();
  }
});

page_ctx.on_update_state = function(state) {
  let need_update_pos = false;
  if (state.pos_x != null) {
    center_x = state.pos_x;
    need_update_pos = true;
  }
  if (state.pos_y != null) {
    center_y = state.pos_y;
    need_update_pos = true;
  }
  if (need_update_pos) {
    update_svg_view();
  }
  update_pnt_go_buttons();
  update_laser_controls();
};

function go_to_pnt(pnt) {
  var p = page_ctx.pnts && page_ctx.pnts[pnt];
  if (!p || p.px == null || p.py == null) {
    return;
  }
  do_printer_action('go-to', { x: p.px, y: p.py });
}

function setup_point_offset(pnt) {
  let pos = get_printer_pos();
  if (pos.x == null || pos.y == null) {
    bootstrap_alert.error(
      '<p>Position unknown</p>' +
      '<hr><p class="mb-0">Wait for printer position update or jog the head first.</p>'
    );
    return;
  }
  fetch('/api/pcb/offset_pnt',{
    method: 'POST',
    headers: {
      'Accept': 'application/json',
      'Content-Type': 'application/json'
    },
    body:JSON.stringify({
      pnt: pnt,
      x: pos.x,
      y: pos.y
    })
  })
  .then(checkStatus)
  .then(parseJSON)
  .then(checkResultStatus)
  .then(function(data) {
    if (data.pnt) {
      page_ctx.pnts[pnt] = data.pnt;
      update_pnt_labels(pnt, data.pnt);
      update_pnt_visibility();
      update_pnt_go_buttons();
    }
  }).catch(function(error) {
    console.log('request failed', error);
    bootstrap_alert.error(
      '<p>Failed to set point</p>' +
      '<hr><p class="mb-0">' + error + '</p>'
    );
  });
}

$('#position-stack').on('click', '.pnt-set-btn', function(){
  if ($(this).prop('disabled')) {
    return;
  }
  setup_point_offset($(this).attr('data-pnt'));
});

$('#position-stack').on('click', '.pnt-go-btn', function(){
  if ($(this).prop('disabled')) {
    return;
  }
  go_to_pnt($(this).attr('data-pnt'));
});

var download_img = new Image();

function update_camera_image() {
  download_img.src = "/video?time="+ new Date().getTime();
}
update_camera_image();

download_img.onload = function(){
  document.getElementById('video-display').src = this.src;
  setTimeout(update_camera_image, 1000/15);
};

</script>
