<!doctype html>

<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/css/bootstrap.min.css" >
    <link rel="stylesheet" href="/css/styles.css" >

    <title>BlackBox - settings</title>
  </head>
  <body>
    <nav class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 navbar-app">
      <button type="button" class="btn btn-link text-white sidebar-toggle d-md-none" id="sidebar-toggle" aria-label="Menu" aria-expanded="false">
        <span data-feather="menu"></span>
      </button>
      <a class="navbar-brand d-none d-md-flex col-md-2 me-0 px-3 align-items-center" href="/">BlackBox</a>
      <div class="navbar-toolbar d-flex align-items-center flex-grow-1 justify-content-end">
        <a class="nav-link py-0 pe-2" href="/" aria-label="Close settings"><span data-feather="x-circle"></span></a>
      </div>
    </nav>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div class="container-fluid">
      <div class="row">
        <%- include('fragments/sidebar',...) %>

        <main role="main" class="col-12 col-md-9 ms-sm-auto col-lg-10 pt-3 px-4">
          <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
            <h1 class="h2 text-capitalize"><%= page %></h1>

            <div class="btn-toolbar mb-2 mb-md-0">
              <button type="submit" form="settings-form" class="btn btn-sm btn-primary me-2">Save</button>
              <a href="/api/settings/export" download="settings.json" class="btn btn-sm btn-outline-secondary me-2" title="Download settings">
                <span data-feather="download"></span>
              </a>
              <button type="button" id="settings-import-btn" class="btn btn-sm btn-outline-secondary" title="Upload settings">
                <span data-feather="upload"></span>
              </button>
              <input type="file" id="settings-import-file" accept=".json,application/json" hidden>
            </div>
          </div>

          <div id="alert_placeholder"></div>

          <form id="settings-form" method="post">
          <!-- settings page <%= page %> -->
          <%
            for _,v in ipairs(settings:get_page(page)) do
          %>
              <div class="form-group">
                <%- settings:format_input(v) %>
              </div>
          <%
            end
          %>
          </form>
          
        </main>
      </div>
    </div>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Bootstrap JS (includes Popper) -->
    <script src="/js/jquery-3.3.1.slim.min.js" ></script>
    <script src="/js/bootstrap.bundle.min.js" ></script>

    <script src="/js/feather.min.js"></script>

    <script>
      feather.replace()
    </script>

    <script src="/js/application.js"></script>
    <script>init_bootstrap_tooltips()</script>

    
    <script>
    $('.list-edit-append').click(function(el) {
      let list_name = $(this).data('list-name')
      console.log('append clicked:' + list_name)
      fetch('/api/settings_add_list_element',{
          method:'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body:JSON.stringify({list_name:list_name})
        })
        .then(checkStatus)
        .then(parseJSON)
        .then(function(data) {
           location.reload();
        }).catch(function(error) {
            bootstrap_alert.error(
                '<p>Failed add element</p>'+
                '<hr><p class="mb-0">' + error + '</p>'
              );
        })
    });

    $('#settings-import-btn').click(function() {
      $('#settings-import-file').click();
    });

    $('#settings-import-file').change(function() {
      var file = this.files[0];
      if (!file) {
        return;
      }
      var data = new FormData();
      data.append('file', file);
      fetch('/api/settings/import', {
        method: 'POST',
        body: data
      })
        .then(checkStatus)
        .then(parseJSON)
        .then(checkResultStatus)
        .then(function() {
          location.reload();
        }).catch(function(error) {
          bootstrap_alert.error(
            '<p>Failed upload settings</p>' +
            '<hr><p class="mb-0">' + error + '</p>'
          );
        });
      this.value = '';
    });

    $('.list-edit-remove').click(function(el) {
      let list_name = $(this).data('list-name')
      let idx = $(this).data('item-idx') * 1;
      console.log('remove clicked:' + list_name + ' idx:' + idx)
      fetch('/api/settings_remove_list_element',{
          method:'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body:JSON.stringify({list_name:list_name,idx:idx})
        })
        .then(checkStatus)
        .then(parseJSON)
        .then(function(data) {
           location.reload();
        }).catch(function(error) {
            bootstrap_alert.error(
                '<p>Failed add element</p>'+
                '<hr><p class="mb-0">' + error + '</p>'
              );
        })
    });
    </script>
  </body>
</html>
